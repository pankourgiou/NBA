<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NBA Champions Perfume & Cocktail Recommender</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #141e30, #243b55);
        color: white;
        text-align: center;
        padding: 40px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: rgba(255,255,255,0.1);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
        margin-bottom: 20px;
    }

    input {
        padding: 12px;
        width: 200px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
    }

    button {
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        background-color: gold;
        color: black;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background-color: orange;
    }

    #result {
        margin-top: 30px;
        font-size: 20px;
        line-height: 1.8;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        margin: 10px 0;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🏀 NBA Champions Perfume & Cocktail Recommender 🍸</h1>

    <input type="text" id="yearInput" placeholder="Enter a year">
    <button onclick="recommend()">Get Recommendation</button>

    <div id="result"></div>
</div>

<script>
const nbaChampions = {
    1985: "Los Angeles Lakers",
    1986: "Boston Celtics",
    1987: "Los Angeles Lakers",
    1988: "Los Angeles Lakers",
    1989: "Detroit Pistons",
    1990: "Detroit Pistons",
    1991: "Chicago Bulls",
    1992: "Chicago Bulls",
    1993: "Chicago Bulls",
    1994: "Houston Rockets",
    1995: "Houston Rockets",
    1996: "Chicago Bulls",
    1997: "Chicago Bulls",
    1998: "Chicago Bulls",
    1999: "San Antonio Spurs",
    2000: "Los Angeles Lakers",
    2001: "Los Angeles Lakers",
    2002: "Los Angeles Lakers",
    2003: "San Antonio Spurs",
    2004: "Detroit Pistons",
    2005: "San Antonio Spurs",
    2006: "Miami Heat",
    2007: "San Antonio Spurs",
    2008: "Boston Celtics",
    2009: "Los Angeles Lakers",
    2010: "Los Angeles Lakers",
    2011: "Dallas Mavericks",
    2012: "Miami Heat",
    2013: "Miami Heat",
    2014: "San Antonio Spurs",
    2015: "Golden State Warriors",
    2016: "Cleveland Cavaliers",
    2017: "Golden State Warriors",
    2018: "Golden State Warriors",
    2019: "Toronto Raptors",
    2020: "Los Angeles Lakers",
    2021: "Milwaukee Bucks",
    2022: "Golden State Warriors",
    2023: "Denver Nuggets",
    2024: "Boston Celtics"
};

const vibes = {
    "Los Angeles Lakers": {
        perfumes: ["Dior Sauvage", "Tom Ford Black Orchid", "Le Labo Santal 33"],
        cocktails: ["Margarita", "Champagne Cocktail", "Mai Tai"]
    },
    "Boston Celtics": {
        perfumes: ["Chanel Bleu de Chanel", "Creed Green Irish Tweed", "Burberry London"],
        cocktails: ["Irish Whiskey Sour", "Old Fashioned", "Irish Coffee"]
    },
    "Chicago Bulls": {
        perfumes: ["Versace Eros", "Armani Code", "YSL Y Eau de Parfum"],
        cocktails: ["Negroni", "Bloody Mary", "Manhattan"]
    },
    "Detroit Pistons": {
        perfumes: ["Paco Rabanne Invictus", "Diesel Only The Brave", "Azzaro Wanted"],
        cocktails: ["Whiskey Sour", "Rusty Nail", "Long Island Iced Tea"]
    },
    "Houston Rockets": {
        perfumes: ["Jean Paul Gaultier Le Male", "Mugler A*Men", "Spicebomb by Viktor&Rolf"],
        cocktails: ["Tequila Sunrise", "Cosmopolitan", "Bloody Mary"]
    },
    "San Antonio Spurs": {
        perfumes: ["Hermès Terre d’Hermès", "Guerlain Vetiver", "Prada L’Homme"],
        cocktails: ["Gin & Tonic", "Mojito", "Caipirinha"]
    },
    "Miami Heat": {
        perfumes: ["Dolce & Gabbana Light Blue", "Acqua di Gio", "Creed Aventus"],
        cocktails: ["Mojito", "Pina Colada", "Cuba Libre"]
    },
    "Dallas Mavericks": {
        perfumes: ["Bleu de Chanel", "Montblanc Explorer", "Gucci Guilty"],
        cocktails: ["Texas Mule", "Whiskey Smash", "Gin Rickey"]
    },
    "Golden State Warriors": {
        perfumes: ["Maison Margiela Jazz Club", "Chanel Allure Homme Sport", "Dior Homme Intense"],
        cocktails: ["Espresso Martini", "Paloma", "Gin Fizz"]
    },
    "Cleveland Cavaliers": {
        perfumes: ["YSL La Nuit de L’Homme", "Givenchy Gentleman", "Armani Stronger With You"],
        cocktails: ["Manhattan", "Black Russian", "Old Fashioned"]
    },
    "Toronto Raptors": {
        perfumes: ["Creed Aventus", "Maison Francis Kurkdjian Baccarat Rouge 540", "Montale Intense Café"],
        cocktails: ["Maple Old Fashioned", "Bloody Caesar", "Vodka Cranberry"]
    },
    "Milwaukee Bucks": {
        perfumes: ["Burberry Hero", "Montblanc Legend", "Loewe Esencia"],
        cocktails: ["Brandy Old Fashioned", "Beer Cocktail", "Whiskey Smash"]
    },
    "Denver Nuggets": {
        perfumes: ["Ermenegildo Zegna Uomo", "Coach for Men", "John Varvatos Artisan"],
        cocktails: ["Colorado Bulldog", "Whiskey Sour", "Mountain Mule"]
    }
};

const nbaLegends = [
    "John Stockton & Steve Kerr",
    "Toni Kukoc & Gary Payton",
    "Michael Jordan & Charles Barkley",
    "Scottie Pippen & Karl Malone",
    "Patrick Ewing & Dennis Rodman",
    "Shaquille O’Neal & Tim Duncan",
    "David Robinson & Hakeem Olajuwon",
    "Shawn Kemp"
];

function randomChoice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function recommend() {
    const input = document.getElementById("yearInput").value;
    const year = parseInt(input);
    const resultDiv = document.getElementById("result");

    if (!isNaN(year) && nbaChampions[year]) {

        const team = nbaChampions[year];
        const vibe = vibes[team];

        const perfume = randomChoice(vibe.perfumes);
        const cocktail = randomChoice(vibe.cocktails);

        resultDiv.innerHTML = `
            <h2>🏆 ${year} NBA Champion: ${team}</h2>
            <p>💐 <strong>Perfume Recommendation:</strong> ${perfume}</p>
            <p>🍹 <strong>Cocktail Pairing:</strong> ${cocktail}</p>
            <p>✨ Stay stylish and hydrated like a true champion!</p>
        `;

    } else {

        let legendsHTML = "";

        nbaLegends.forEach(legend => {
            legendsHTML += `<li>🏀 ${legend}</li>`;
        });

        resultDiv.innerHTML = `
            <h2>🎸 Listen to Foo Fighters and drink a "Rock the Barrel"!</h2>
            <p>Here are some NBA legends you can always trust on the court:</p>
            <ul>${legendsHTML}</ul>
        `;
    }
}
</script>

</body>
</html>
